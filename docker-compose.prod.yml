services:
  db:
    image: mysql:8.0
    container_name: gantly-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: gantly
    ports:
      - "3306:3306"
    volumes:
      - gantly-db-data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./psicoapp
      dockerfile: Dockerfile
    container_name: gantly-backend
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:mysql://db:3306/gantly?useSSL=false&serverTimezone=UTC
      DATABASE_USER: root
      DATABASE_PASSWORD: ${DB_PASSWORD}
      TZ: Europe/Madrid
    volumes:
      - app-uploads:/app/uploads
      - app-logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: gantly-react
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  gantly-db-data:
  app-uploads:
  app-logs:
