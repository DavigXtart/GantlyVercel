services:
  db:
    image: mysql:8.0
    container_name: gantly-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: gantly
    ports:
      - "3306:3306"
    volumes:
      - gantly-db-data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./psicoapp
      dockerfile: Dockerfile
    container_name: gantly-backend
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:mysql://db:3306/gantly?useSSL=false&serverTimezone=UTC
      DATABASE_USER: root
      DATABASE_PASSWORD: ${DB_PASSWORD}
      TZ: Europe/Madrid
    volumes:
      - app-uploads:/app/uploads
      - app-logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        NGINX_CONF: nginx.prod.conf
    container_name: gantly-react
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - backend

  certbot:
    image: certbot/certbot
    container_name: gantly-certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  db-backup:
    image: mysql:8.0
    container_name: gantly-db-backup
    restart: always
    entrypoint: /bin/sh -c "while true; do mysqldump -h db -u root -p$${DB_PASSWORD} gantly | gzip > /backups/gantly_$$(date +%Y%m%d_%H%M%S).sql.gz; find /backups -name '*.sql.gz' -mtime +30 -delete; sleep 86400; done"
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - gantly-backups:/backups
    depends_on:
      - db

volumes:
  gantly-db-data:
  app-uploads:
  app-logs:
  certbot-conf:
  certbot-www:
  gantly-backups:
