spring:
  application:
    name: psicoapp
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 2KB
  task:
    scheduling:
      pool:
        size: 2
server:
  port: 8080
