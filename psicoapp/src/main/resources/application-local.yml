spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/gantly}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    groups-order: DESC
  group-configs:
    - group: psicoapp
      paths-to-match: /**

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

stripe:
  secret:
    key: ${STRIPE_SECRET_KEY:}
  public:
    key: ${STRIPE_PUBLIC_KEY:}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET:}
  prices:
    basic:
      monthly: price_1TCOOsBfHWMdW4wSXIRiG7lM
      yearly: price_1TCOPQBfHWMdW4wSuVZyr0p5
    premium:
      monthly: price_1TCOPkBfHWMdW4wSnhyfEba6
      yearly: price_1TCOQ3BfHWMdW4wSI7G8R9ke
    enterprise:
      monthly: price_1TCOQIBfHWMdW4wSz1NAbGt1
      yearly: price_1TCOQfBfHWMdW4wSH9zzro5X

app:
  base:
    url: ${APP_BASE_URL:http://localhost:5173}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4200}
  email:
    resend-api-key: ${RESEND_API_KEY:}
    from: ${EMAIL_FROM:noreply@gantly.com}
    from-name: ${EMAIL_FROM_NAME:Gantly}
