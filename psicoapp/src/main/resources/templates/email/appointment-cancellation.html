<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#f0fdf4;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f0fdf4;padding:40px 20px;">
    <tr><td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">
            <tr><td style="background:linear-gradient(135deg,#065f46,#10b981);padding:32px 40px;text-align:center;">
                <h1 style="color:#ffffff;margin:0;font-size:28px;font-weight:700;">PSYmatch</h1>
            </td></tr>
            <tr><td style="padding:40px;">
                <h2 style="color:#065f46;margin:0 0 16px;font-size:22px;" th:text="'Hola ' + ${patientName} + ','">Hola,</h2>
                <p style="color:#374151;font-size:16px;line-height:1.6;">Tu cita ha sido <strong style="color:#dc2626;">cancelada</strong>.</p>
                <table style="width:100%;background:#fef2f2;border-radius:12px;padding:20px;margin:24px 0;" cellpadding="8">
                    <tr><td style="color:#6b7280;font-size:14px;">Profesional:</td>
                        <td style="color:#991b1b;font-size:14px;font-weight:600;" th:text="${psychologistName}">Dr. Garcia</td></tr>
                    <tr><td style="color:#6b7280;font-size:14px;">Fecha y hora:</td>
                        <td style="color:#991b1b;font-size:14px;font-weight:600;" th:text="${appointmentDate}">01/03/2026 10:00</td></tr>
                </table>
                <p style="color:#374151;font-size:14px;line-height:1.6;">Puedes solicitar una nueva cita desde tu panel.</p>
            </td></tr>
            <tr><td style="background:#f9fafb;padding:24px 40px;text-align:center;border-top:1px solid #e5e7eb;">
                <p style="color:#9ca3af;font-size:12px;margin:0;">El equipo de PSYmatch</p>
            </td></tr>
        </table>
    </td></tr>
</table>
</body>
</html>
