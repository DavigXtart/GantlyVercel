services:
  db:
    image: mysql:8.0
    container_name: gantly-db
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: gantly
    ports:
      - "3306:3306"
    volumes:
      - gantly-db-data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./psicoapp
      dockerfile: Dockerfile.local
    container_name: gantly-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:mysql://db:3306/gantly?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: 1234
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend-angular
    container_name: gantly-angular
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  gantly-db-data:
